name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  curriculum:
    name: Test integrità curriculum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui test_curriculum.py
        run: python test_curriculum.py -q

      - name: Esegui test_gamification.py
        run: python test_gamification.py -q
